<div class="max-w-3xl mx-auto p-6">
    <div id="step-1" class="bg-white p-6 rounded-xl shadow-md">
        <h3 class="font-bold text-xl mb-4">Langkah 1: Data Pribadi</h3>
        <input type="text" id="jk" placeholder="Jenis Kelamin (L/P)" class="w-full p-3 border mb-2">
        <input type="text" id="nik" placeholder="NIK" class="w-full p-3 border mb-2">
        <button onclick="nextStep(1, 2)" class="bg-blue-600 text-white px-4 py-2 mt-4">Selanjutnya</button>
    </div>

    <div id="step-2" class="hidden bg-white p-6 rounded-xl shadow-md">
        <h3 class="font-bold text-xl mb-4">Langkah 2: Data Orang Tua</h3>
        <input type="text" id="namaAyah" placeholder="Nama Ayah" class="w-full p-3 border mb-2">
        <button onclick="nextStep(2, 1)" class="bg-gray-500 text-white px-4 py-2 mt-4">Kembali</button>
        <button onclick="nextStep(2, 3)" class="bg-blue-600 text-white px-4 py-2 mt-4">Selanjutnya</button>
    </div>

    <div id="step-3" class="hidden bg-white p-6 rounded-xl shadow-md">
        <h3 class="font-bold text-xl mb-4">Langkah 3: Upload Berkas</h3>
        <label>Pas Foto (Max 500kb):</label>
        <input type="file" id="foto" class="mb-4">
        <button onclick="submitForm()" class="bg-emerald-600 text-white px-6 py-3 mt-4 w-full font-bold">Kirim Pendaftaran</button>
    </div>
</div>

<script>
    function nextStep(current, next) {
        document.getElementById('step-'+current).classList.add('hidden');
        document.getElementById('step-'+next).classList.remove('hidden');
    }

    async function submitForm() {
        // Konversi file ke base64 (WAJIB ADA)
        const file = document.getElementById('foto').files[0];
        const reader = new FileReader();
        reader.onloadend = async () => {
            const payload = {
                action: 'updateLengkap',
                nisn: localStorage.getItem('userNISN'),
                fileFoto: reader.result.split(',')[1],
                mimeFoto: file.type,
                jk: document.getElementById('jk').value,
                // ... tambahkan field lainnya
            };
            const res = await fetch(URL_GAS, { method: 'POST', body: JSON.stringify(payload) });
            Swal.fire('Sukses', 'Data berhasil dikirim!', 'success');
        };
        reader.readAsDataURL(file);
    }
</script>
