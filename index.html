<!DOCTYPE html>
<html lang="id">
<head>

<body class="bg-gray-50 min-h-screen flex flex-col">

            <a href="pmb/index.html" class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-lg transition-all">

            <a href="login.html" class="bg-white p-6 rounded-2xl shadow-sm border hover:shadow-lg transition-all">
