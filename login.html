<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Internal | MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0B1F3B', accent: '#D4AF37' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center">

    <!-- Container Utama -->
    <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl flex overflow-hidden border border-slate-100">
        
        <!-- Left Side: Branding (Hanya tampil di Desktop) -->
        <div class="hidden md:flex w-1/2 bg-primary p-12 flex-col justify-between text-white relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
            <div class="relative z-10">
                <div class="w-12 h-12 bg-accent text-primary rounded-xl flex items-center justify-center font-bold text-xl mb-6">M</div>
                <h2 class="text-3xl font-extrabold mb-4">Sistem Akademik Terintegrasi</h2>
                <p class="text-slate-300 text-sm leading-relaxed">Kelola administrasi, kepegawaian, dan data madrasah dengan sistem yang aman, cepat, dan modern.</p>
            </div>
            <div class="relative z-10 text-xs text-slate-400 font-medium uppercase tracking-widest">
                &copy; 2026 MAS MANBA'USSALAM
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 flex flex-col justify-center">
            <div class="mb-8">
                <h3 class="text-2xl font-extrabold text-slate-900 mb-2">Selamat Datang Kembali</h3>
                <p class="text-slate-500 text-sm">Masukkan kredensial Anda untuk melanjutkan ke dashboard.</p>
            </div>

            <form action="admin/index.html" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-slate-700 mb-2 uppercase tracking-wide">ID Pengguna / Email</label>
                    <input type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all" placeholder="masukkan id...">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-700 mb-2 uppercase tracking-wide">Kata Sandi</label>
                    <input type="password" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary transition-all" placeholder="••••••••">
                </div>
                
                <button class="w-full bg-primary text-white font-bold py-4 rounded-xl hover:bg-slate-950 transition-all shadow-lg shadow-primary/20">
                    Masuk ke Sistem
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-primary transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Kembali ke Menu Utama
                </a>
            </div>
        </div>
    </div>

</body>
</html>
