<!DOCTYPE html>
<html lang="id">

    <title>Login | MAS MANBA'USSALAM</title>

</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

        <h2 class="font-bold text-xl mb-6 text-center">Masuk ke Sistem</h2>

        </form>
    </div>
