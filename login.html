<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Internal | MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0B1F3B', accent: '#D4AF37' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-2xl flex overflow-hidden border border-slate-100">
        
        <!-- Left Side: Branding -->
        <div class="hidden md:flex w-1/2 bg-primary p-12 flex-col justify-between text-white relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
            <div class="relative z-10">
                <div class="w-12 h-12 bg-accent text-primary rounded-xl flex items-center justify-center font-bold text-xl mb-6">M</div>
                <h2 class="text-3xl font-extrabold mb-4">Sistem Akademik Terintegrasi</h2>
                <p class="text-slate-300 text-sm leading-relaxed">Kelola administrasi, kepegawaian, dan data madrasah dengan sistem yang aman, cepat, dan modern.</p>
            </div>
            <div class="relative z-10 text-xs text-slate-400 font-medium uppercase tracking-widest">
                &copy; 2026 MAS MANBA'USSALAM
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 flex flex-col justify-center">
            <div class="mb-8">
                <h3 class="text-2xl font-extrabold text-slate-900 mb-2">Selamat Datang Kembali</h3>
                <p class="text-slate-500 text-sm">Masukkan kredensial Anda untuk melanjutkan.</p>
            </div>

            <!-- HANYA SATU FORM INI SAJA -->
            <form onsubmit="doLogin(event)" class="space-y-5">
                <input type="text" id="user" required class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="NISN / NIK / Username">
                
                <div id="password-container">
                    <input type="date" id="pass-date" class="w-full p-4 border rounded-xl hidden" title="Pilih Tanggal Lahir">
                    <input type="password" id="pass-text" class="w-full p-4 border rounded-xl" placeholder="Password">
                </div>

                <button type="submit" class="w-full bg-primary text-white p-4 rounded-xl font-bold hover:bg-slate-900 transition-all">Masuk ke Sistem</button>
            </form>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-primary transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Kembali ke Menu Utama
                </a>
            </div>
        </div>
    </div>

    <script>
        // Logika Toggle Password vs Date Picker
        const userField = document.getElementById('user');
        const passDate = document.getElementById('pass-date');
        const passText = document.getElementById('pass-text');

        userField.addEventListener('input', () => {
            const val = userField.value;
            if (val.length >= 10) {
                passDate.classList.remove('hidden');
                passText.classList.add('hidden');
                passDate.setAttribute('required', 'true');
                passText.removeAttribute('required');
            } else {
                passDate.classList.add('hidden');
                passText.classList.remove('hidden');
                passDate.removeAttribute('required');
                passText.setAttribute('required', 'true');
            }
        });

        // Logika Login
        function doLogin(e) {
            e.preventDefault();
            const user = userField.value;
            // Ambil value dari input yang aktif saja
            const pass = passDate.classList.contains('hidden') ? passText.value : passDate.value;

            // Simulasi Database
            if (user === 'siswa1' && pass === '2008-05-15') { // Contoh password tanggal lahir
                localStorage.setItem('userRole', 'siswa');
                window.location.href = 'index.html';
            } else if (user === 'admin1' && pass === 'admin123') {
                localStorage.setItem('userRole', 'admin');
                window.location.href = 'index.html';
            } else {
                alert('Username atau Password salah!');
            }
        }
    </script>
</body>
</html>
