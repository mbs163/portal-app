<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Internal | MAS MANBA'USSALAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0B1F3B', accent: '#D4AF37' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center">

    <!-- Container Utama -->
    <div class="bg-white w-full max-w-4xl mx-4 rounded-3xl shadow-2xl flex overflow-hidden border border-slate-100">
        
        <!-- Left Side: Branding (Hanya tampil di Desktop) -->
        <div class="hidden md:flex w-1/2 bg-primary p-12 flex-col justify-between text-white relative overflow-hidden">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
            <div class="relative z-10">
                <div class="w-12 h-12 bg-accent text-primary rounded-xl flex items-center justify-center font-bold text-xl mb-6">M</div>
                <h2 class="text-3xl font-extrabold mb-4">Sistem Akademik Terintegrasi</h2>
                <p class="text-slate-300 text-sm leading-relaxed">Kelola administrasi, kepegawaian, dan data madrasah dengan sistem yang aman, cepat, dan modern.</p>
            </div>
            <div class="relative z-10 text-xs text-slate-400 font-medium uppercase tracking-widest">
                &copy; 2026 MAS MANBA'USSALAM
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="w-full md:w-1/2 p-8 sm:p-12 flex flex-col justify-center">
            <div class="mb-8">
                <h3 class="text-2xl font-extrabold text-slate-900 mb-2">Selamat Datang Kembali</h3>
                <p class="text-slate-500 text-sm">Masukkan kredensial Anda untuk melanjutkan ke dashboard.</p>
            </div>

           <form onsubmit="doLogin(event)" class="space-y-5">
    <input type="text" id="user" required class="w-full p-4 border rounded-xl" placeholder="NISN / NIK / Username">
    
    <div id="password-container">
        <input type="date" id="pass-date" class="w-full p-4 border rounded-xl hidden" title="Pilih Tanggal Lahir">
        <input type="password" id="pass-text" class="w-full p-4 border rounded-xl" placeholder="Password">
    </div>

    <button type="submit" class="w-full bg-primary text-white p-4 rounded-xl font-bold">Masuk ke Sistem</button>
</form>

<script>
    // Logika agar input otomatis berubah jika user mengetik NISN/NIK
    const userField = document.getElementById('user');
    userField.addEventListener('input', () => {
        const val = userField.value;
        const passDate = document.getElementById('pass-date');
        const passText = document.getElementById('pass-text');

        // Jika panjang input 10 atau 16 digit, asumsikan itu NISN/NIK, tampilkan Date Picker
        if (val.length >= 10) {
            passDate.classList.remove('hidden');
            passText.classList.add('hidden');
        } else {
            passDate.classList.add('hidden');
            passText.classList.remove('hidden');
        }
    });
</script>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-xs font-bold text-slate-400 hover:text-primary transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Kembali ke Menu Utama
                </a>
            </div>
        </div>
    </div>
    <!-- Ganti bagian script di dalam login.html Anda dengan ini -->
<script>
    function doLogin(e) {
        e.preventDefault();
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        // Simulasi Database Hardcoded
        if (user === 'siswa1' && pass === 'siswa123') {
            localStorage.setItem('userRole', 'siswa');
            window.location.href = 'index.html';
        } else if (user === 'guru1' && pass === 'guru123') {
            localStorage.setItem('userRole', 'guru');
            window.location.href = 'index.html';
        } else if (user === 'kepala1' && pass === 'kepala123') {
            localStorage.setItem('userRole', 'kepala');
            window.location.href = 'index.html';
        } else if (user === 'admin1' && pass === 'admin123') {
            localStorage.setItem('userRole', 'admin');
            window.location.href = 'index.html';
        } else {
            alert('Username atau Password salah!');
        }
    }
</script>

<!-- Pastikan form Anda memiliki onsubmit="doLogin(event)" -->
<form onsubmit="doLogin(event)" class="space-y-5">
    <input type="text" id="user" required class="w-full p-4 border rounded-xl" placeholder="Username">
    <input type="password" id="pass" required class="w-full p-4 border rounded-xl" placeholder="Password">
    <button class="w-full bg-primary text-white p-4 rounded-xl font-bold">Masuk ke Sistem</button>
</form>

</body>
</html>
